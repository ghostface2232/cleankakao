name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $name = "cleankakao-$tag-x86_64"
          $packageDir = Join-Path "dist" $name
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\cleankakao.exe" $packageDir
          Copy-Item "README.md" $packageDir
          Copy-Item "LICENSE" $packageDir
          Compress-Archive -Path "$packageDir\*" -DestinationPath "dist\$name.zip" -Force

      - name: Upload GitHub Release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "dist\cleankakao-$tag-x86_64.zip"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip --clobber
          } else {
            gh release create $tag $zip --title $tag --generate-notes
          }
